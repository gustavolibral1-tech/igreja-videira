<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>WiFi - Siga nosso Instagram</title>

<style>

body{

background:#f2f2f2;

padding-top:80px;
}

.box{
background:white;
width:350px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

padding:12px 25px;
font-size:16px;
border:none;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

.instagram{
background:#E1306C;
color:white;
}

wifi{
background:#2ecc71;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h2>Conecte ao Wi-Fi</h2>

<p>Antes de acessar a internet, siga nosso Instagram 👇</p>

<a href="https://instagram.com/videira.anapolis" target="_blank">
<button class="instagram">Seguir no Instagram</button>
</a>

<br>

<a href="https://google.com">
<button class="wifi">Já segui / Conectar WiFi</button>
</a>

</div>

</body>
</html>
